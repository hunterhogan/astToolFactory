name: Sync CPython ASDL Files

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install and run sync_cpython_asdl
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          pip install PyGithub
          python astToolFactory/cpython/sync_cpython_asdl.py
